<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neighborhood Vibes Tracker v3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      /* Refined Dark Theme to kill the glare */
      --bg: #020617;
      --bg-gradient: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      --bg-alt: rgba(30, 41, 59, 0.7); /* Translucent for glass effect */
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(255, 255, 255, 0.1);
      --card-radius: 16px;
      --glass-blur: blur(12px);
    }

    * { box-sizing: border-box; font-family: system-ui, sans-serif; }

    body {
      margin: 0;
      background: var(--bg);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    /* The "Anti-Glare" Scrim */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; height: 300px;
      background: linear-gradient(to bottom, rgba(2, 6, 23, 0.9), transparent);
      z-index: 1;
      pointer-events: none;
    }

    .app { width: 100%; max-width: 600px; z-index: 2; position: relative; }

    /* Premium Agent Header */
    .agent-card {
      background: var(--bg-alt);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .agent-photo {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--accent);
      object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 1.5rem; color: #fff;
      border: 2px solid var(--accent);
    }

    .agent-info h2 { margin: 0; font-size: 1.1rem; color: var(--text); }
    .agent-info p { margin: 2px 0 0; font-size: 0.85rem; color: var(--muted); }

    .buyer-badge {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
      margin-top: 8px;
    }

    .card {
      background: var(--bg-alt);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    input, textarea, select {
      width: 100%; padding: 12px; border-radius: 8px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.2);
      color: white; margin-bottom: 12px;
    }

    .btn {
      width: 100%; padding: 14px; border-radius: 99px; border: none;
      font-weight: 600; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn-primary { background: var(--accent); color: #020617; }
    .btn-share { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 10px; }

    /* Modal for Buyer Name */
    #onboardingModal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px); z-index: 100;
      display: none; align-items: center; justify-content: center; padding: 20px;
    }

    /* Print Styles for PDF */
    @media print {
      .no-print, .btn, #vibesForm { display: none !important; }
      body { background: white; color: black; }
      .card { border: 1px solid #ccc; background: white; backdrop-filter: none; }
    }
  </style>
</head>
<body>

<div id="onboardingModal">
  <div class="card" style="width: 100%; max-width: 400px;">
    <h3>Welcome!</h3>
    <p>Who is scouting neighborhoods today?</p>
    <input type="text" id="buyerInput" placeholder="e.g. The Miller Family">
    <button class="btn btn-primary" onclick="saveBuyerName()">Start Scouting</button>
  </div>
</div>

<div class="app">
  <div class="agent-card">
    <div id="agentPhoto" class="agent-photo">?</div>
    <div class="agent-info">
      <h2 id="agentName">Your Agent</h2>
      <p id="agentBiz">Brokerage Info</p>
      <div id="buyerNameDisplay" class="buyer-badge">Scout: Guest</div>
    </div>
  </div>

  <form id="vibesForm" class="card">
    <label>Location / Address</label>
    <input id="spotName" type="text" placeholder="e.g. 123 Maple St" required>
    
    <label>Overall Vibe (1-5)</label>
    <input id="vibeScore" type="range" min="1" max="5" value="3">
    
    <textarea id="notes" placeholder="Notes on noise, traffic, or gut feelings..."></textarea>
    
    <button type="submit" class="btn btn-primary">Save Snapshot</button>
  </form>

  <div id="archive">
    <h3 class="no-print">Saved Snapshots</h3>
    <div id="snapshotsContainer"></div>
  </div>
  
  <button class="btn btn-share no-print" onclick="window.print()">Generate PDF Report</button>
</div>

<script>
  const STORAGE_KEY = "neighborhoodVibes_v3";
  let agentPhone = "";

  // 1. URL Branding Logic
  function initBranding() {
    const params = new URLSearchParams(window.location.search);
    const data = {
      n: params.get('n') || localStorage.getItem('agent_n') || "Your Agent",
      b: params.get('b') || localStorage.getItem('agent_b') || "Professional Realtor",
      p: params.get('p') || localStorage.getItem('agent_p') || "",
      img: params.get('img') || localStorage.getItem('agent_img') || ""
    };

    // Save to localStorage so it persists even if link changes
    Object.keys(data).forEach(key => localStorage.setItem('agent_' + key, data[key]));

    document.getElementById('agentName').textContent = data.n;
    document.getElementById('agentBiz').textContent = data.b;
    agentPhone = data.p;

    const photoEl = document.getElementById('agentPhoto');
    if (data.img) {
      photoEl.innerHTML = `<img src="${data.img}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
      photoEl.textContent = data.n.charAt(0);
    }
  }

  // 2. Buyer Personalization
  function checkBuyer() {
    const name = localStorage.getItem('buyer_name');
    if (!name) {
      document.getElementById('onboardingModal').style.display = 'flex';
    } else {
      document.getElementById('buyerNameDisplay').textContent = `Scout: ${name}`;
    }
  }

  function saveBuyerName() {
    const name = document.getElementById('buyerInput').value.trim();
    if (name) {
      localStorage.setItem('buyer_name', name);
      document.getElementById('onboardingModal').style.display = 'none';
      checkBuyer();
    }
  }

  // 3. Native SMS Sharing
  function textAgent(location, score) {
    const buyer = localStorage.getItem('buyer_name') || "Your Client";
    const msg = `Hi! It's ${buyer}. I just scored ${location} a ${score}/5 on the Vibe Tracker. I think we should talk about this one!`;
    window.location.href = `sms:${agentPhone}?body=${encodeURIComponent(msg)}`;
  }

  // 4. Core Logic
  const form = document.getElementById('vibesForm');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const snap = {
      id: Date.now(),
      name: document.getElementById('spotName').value,
      score: document.getElementById('vibeScore').value,
      notes: document.getElementById('notes').value,
      date: new Date().toLocaleDateString()
    };
    const snaps = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    snaps.push(snap);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snaps));
    render();
    form.reset();
  });

  function render() {
    const container = document.getElementById('snapshotsContainer');
    const snaps = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    container.innerHTML = snaps.reverse().map(s => `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>${s.name}</strong>
          <span style="color:var(--accent)">★ ${s.score}/5</span>
        </div>
        <p style="font-size:0.9rem; color:var(--muted)">${s.notes}</p>
        <button class="btn btn-share no-print" onclick="textAgent('${s.name}', '${s.score}')">
          Text to Agent
        </button>
      </div>
    `).join('');
  }

  // Initialize
  initBranding();
  checkBuyer();
  render();
</script>

</body>
</html>

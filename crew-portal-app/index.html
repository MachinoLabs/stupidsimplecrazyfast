<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crew Portal | Field Utility</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="icon-256x256.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --surface-dark: #1a1a1a;
            --neon-green: #39FF14;
            --neon-cyan: #00FFFF;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER / LOGO */
        .app-header {
            text-align: center;
            padding: 30px 20px 20px;
            background-color: var(--bg-dark);
            border-bottom: 1px solid #222;
        }

        .brand-logo {
            width: 80px; /* Adjust based on your cropped icon */
            margin-bottom: 10px;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-green);
            line-height: 1;
            letter-spacing: -1px;
        }

        .brand-extension {
            color: var(--neon-cyan);
        }

        /* MAIN APP FORM */
        .app-main {
            flex: 1;
            padding: 30px 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            background-color: var(--surface-dark);
            border: 2px solid transparent;
            color: white;
            font-size: 16px;
            font-weight: 500;
            padding: 16px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* BIG BUTTON */
        .submit-btn {
            width: 100%;
            background-color: var(--neon-green);
            color: #000000;
            font-size: 18px;
            font-weight: 900;
            padding: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            margin-top: 10px;
        }

        .submit-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(57, 255, 20, 0.5);
        }

        /* BIG CHEDDAR FOOTER */
        .footer {
            text-align: center;
            padding: 30px 20px;
            background-color: var(--surface-dark);
            border-top: 1px solid #222;
        }

        .footer-tag {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .footer-tag a {
            color: var(--neon-green);
            text-decoration: none;
            font-size: 14px;
        }

        .footer-credits {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }

        .footer-credits a {
            color: var(--neon-cyan);
            text-decoration: none;
        }

        /* Success Message Overlay */
        #success-msg {
            display: none;
            color: var(--bg-dark);
            background-color: var(--neon-green);
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <img src="icon-256x256.png" alt="Crew Portal Icon" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-title">CREW PORTAL<span class="brand-extension">.app</span></div>
    </header>

    <main class="app-main">
        <div id="success-msg">JOB SYNCED SUCCESSFULLY!</div>

        <form id="crew-form">
            <div class="form-group">
                <label class="form-label">Crew Leader</label>
                <select class="form-control" id="crew-name" required>
                    <option value="" disabled selected>Select your truck...</option>
                    <option value="Truck 1 - Alpha">Truck 1 - Alpha</option>
                    <option value="Truck 2 - Bravo">Truck 2 - Bravo</option>
                    <option value="Truck 3 - Charlie">Truck 3 - Charlie</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Client / Property Address</label>
                <input type="text" class="form-control" id="job-location" placeholder="e.g. 123 Main St" required>
            </div>

            <div class="form-group">
                <label class="form-label">Services Completed</label>
                <input type="text" class="form-control" id="job-services" placeholder="e.g. Mowing, Edging, Mulch" required>
            </div>

            <div class="form-group">
                <label class="form-label">Field Notes / Materials Used</label>
                <textarea class="form-control" id="job-notes" placeholder="Any issues or extra materials?"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Sync Job to Office</button>
        </form>
    </main>

    <footer class="footer"> 
        <p class="footer-tag">
            Powered by <a href="https://crewportal.app" target="_blank">CrewPortal.app</a>
        </p> 
        <div class="footer-credits"> 
            A StupidSimpleCrazyFast™ Micro-App Framework Production <br>
            Built by <a href="https://machinolabs.com" target="_blank">MachinoLabs</a> • 
            <a href="https://sscf.app" target="_blank">sscf.app</a> <br> 
            Joe • 717.623.2907 
        </div> 
    </footer>

    <script>
        // Form Submission Logic (Placeholder for your Google Apps Script)
        document.getElementById('crew-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            
            // UI Feedback
            btn.innerText = "SYNCING...";
            btn.style.opacity = "0.7";

            // Simulate network request (replace this with your actual Google Sheet fetch call)
            setTimeout(() => {
                document.getElementById('success-msg').style.display = 'block';
                btn.innerText = originalText;
                btn.style.opacity = "1";
                this.reset(); // Clear the form for the next house

                // Hide success message after 3 seconds
                setTimeout(() => {
                    document.getElementById('success-msg').style.display = 'none';
                }, 3000);
            }, 1000);
        });

        // Register Service Worker for PWA (Offline capability)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(registration => console.log('ServiceWorker registered'))
                .catch(err => console.log('ServiceWorker failed: ', err));
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stupid Simple Crazy Fast | Innovation Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;          /* Machino Pure Black */
            --panel: #0a0a0a;       /* Deep Slate */
            --cyan: #00e5ff;        /* Machino Cyan */
            --gold: #ffbf00;        /* Logo Gold */
            --text: #ffffff;        /* Pure White */
            --muted: #94a3b8;       /* Clean Slate */
            --line: #1a1a1a;        /* Subtle Border */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px 20px; }

        /* HEADER */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; margin-bottom: 40px; border-bottom: 1px solid var(--line);
        }
        .brand-mark { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; }
        .brand-mark span { color: var(--cyan); }

        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--cyan); }

        /* HERO SECTION - MACHINOLABS ALIGNMENT */
        .hero { 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 60px; 
            align-items: flex-start; /* Aligns both to the top shelf */
            min-height: 500px;
            margin-bottom: 80px;
            padding-top: 20px;
        }
        
        /* THE MAIN HEADLINE */
        h2 { 
            font-size: clamp(2.5rem, 5vw, 4.8rem); font-weight: 900; line-height: 0.95; 
            text-transform: uppercase; letter-spacing: -2px; margin-bottom: 25px;
            margin-top: -8px; /* Micro-adjustment for font-ascent */
        }
        h2 .fast-text { 
            color: var(--cyan); 
            font-style: italic; 
            display: inline-block;
            transform: skewX(-6deg);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        .hero-p { font-size: 1.2rem; color: var(--muted); margin-bottom: 40px; max-width: 520px; }
        
        /* THE SINGLE MACHINOLABS-STYLE LOGO FRAME */
        .logo-frame {
            background: #000;
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 0; /* No inner box-in-box padding */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /* The Machino "Fabulous" Bloom Effect */
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15); 
            margin-top: 5px; /* Adjusts the logo to sit on the same horizontal shelf as the text */
        }
        
        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 18px;
            display: block;
            /* Direct emissive glow on the artwork itself */
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.3));
        }

        /* BUTTONS */
        .btn {
            display: inline-block; padding: 18px 38px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; text-decoration: none; transition: 0.3s;
            font-size: 0.95rem;
        }
        .btn-main { background: var(--cyan); color: #000; margin-right: 15px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        .btn-alt { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
        .btn:hover { transform: translateY(-4px); filter: brightness(1.1); }

        /* SECTION TITLES */
        .section-title {
            margin: 80px 0 30px;
            border-left: 4px solid var(--cyan);
            padding-left: 20px;
        }
        .section-title h3 { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }
        .section-title.gold-title { border-left-color: var(--gold); }
        .section-title span { color: var(--muted); font-weight: 400; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card {
            background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
            padding: 35px; text-decoration: none; color: #fff; transition: 0.3s;
            min-height: 200px;
        }
        .card:hover { border-color: var(--cyan); transform: translateY(-8px); }
        .card.game-card:hover { border-color: var(--gold); }
        .card h3 { font-weight: 900; text-transform: uppercase; margin-bottom: 12px; font-size: 1.3rem; }
        .card.tool-card h3 { color: var(--cyan); }
        .card.game-card h3 { color: var(--gold); }
        .card p { color: var(--muted); font-size: 0.95rem; }

        /* FEEDBACK STATION */
        .feedback-station {
            margin-top: 80px; padding: 60px;
            background: var(--panel); border: 1px solid var(--line);
            border-radius: 30px; text-align: center;
        }
        .feedback-station h4 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
